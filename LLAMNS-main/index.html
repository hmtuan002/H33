<html>
  <head>
    <title>Multiplayer Demo - Nón Lá Việt Nam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" type="text/css">
  </head>
  <body>

    <!-- CAMERA WRAPPER - clips the zoomed map -->
    <div class="camera-wrapper">
      <div class="camera-pan" id="camera-pan">
        <div class="game-container">
        </div>
      </div>
    </div>
    
    <!-- COORDINATE DISPLAY -->
    <div class="coord-display" id="coord-display">
      📍 X: -- | Y: --
    </div>
    
    <!-- PLAYER INFO -->
    <div class="player-info">
      <div>
        <label for="player-name">🏷️ Tên của bạn</label>
        <input id="player-name" maxlength="10" type="text" />
      </div>
      <div class="coin-display">
        <label>💰 Xu</label>
        <div id="player-coins" class="coin-amount">0</div>
      </div>
    </div>
    
    <!-- Mobile Joystick -->
    <div class="joystick-container" id="joystick-container">
      <div class="joystick-base" id="joystick-base">
        <div class="joystick-thumb" id="joystick-thumb"></div>
      </div>
    </div>

    <!-- Merchant Modal (giữ nguyên) -->
    <div id="merchant-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>🎨 CỬA HÀNG SKIN 🎨</h2>
          <span id="close-modal" class="close">&times;</span>
        </div>
        <div class="modal-body">
          <p id="merchant-message" class="merchant-message">Chào mừng! Mua skin bằng xu của bạn!</p>
          <div class="skin-shop-grid" id="skin-shop-list"></div>
        </div>
      </div>
    </div>

    <!-- POKÉMON-STYLE NPC Dialogue Box (không overlay, ở đáy màn hình) -->
    <div id="npc-dialogue-box">
      <div class="poke-dialogue-inner" id="poke-inner">
        <div class="poke-speaker">🎋 LÃO NHÂN</div>
        <p class="poke-text" id="poke-text"></p>
        <div class="poke-arrow" id="poke-arrow"></div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="KeyPressListener.js"></script>
    <script src="Joystick.js"></script>
    <script src="app.js"></script>
  </body>
</html>
