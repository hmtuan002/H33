<html>
  <head>
    <title>Multiplayer Demo - Skin Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" type="text/css">
  </head>
  <body>

    <div class="game-container">
    </div>
    <div class="player-info">
      <div>
        <label for="player-name">Your Name</label>
        <input id="player-name" maxlength="10" type="text" />
      </div>
      <div>
        <button id="change-skin">🎨 Change Skin</button>
      </div>
      <div class="coin-display">
        <label>💰 Coins</label>
        <div id="player-coins" class="coin-amount">0</div>
      </div>
    </div>

    <!-- Merchant Modal -->
    <div id="merchant-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>🎨 SKIN SHOP 🎨</h2>
          <span id="close-modal" class="close">&times;</span>
        </div>
        <div class="modal-body">
          <p id="merchant-message" class="merchant-message">Welcome! Buy skins with your coins!</p>
          <div class="skin-shop-grid" id="skin-shop-list">
            <!-- Skins will be dynamically added here -->
          </div>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script src="KeyPressListener.js"></script>
    <script src="app.js"></script>
  </body>
</html>
