<html>
  <head>
    <title>Multiplayer Demo - Nón Lá Việt Nam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" type="text/css">
  </head>
  <body>

    <div class="game-container">
    </div>
    
    <!-- Mobile Joystick Controls -->
    <div class="joystick-container" id="joystick-container">
      <div class="joystick-base" id="joystick-base">
        <div class="joystick-thumb" id="joystick-thumb"></div>
      </div>
    </div>
    
    <!-- Touch buttons for mobile -->
    <div class="mobile-controls">
      <button class="mobile-btn" id="mobile-up">▲</button>
      <div class="mobile-row">
        <button class="mobile-btn" id="mobile-left">◀</button>
        <button class="mobile-btn" id="mobile-down">▼</button>
        <button class="mobile-btn" id="mobile-right">▶</button>
      </div>
    </div>
    
    <div class="player-info">
      <div>
        <label for="player-name">Your Name</label>
        <input id="player-name" maxlength="10" type="text" />
      </div>
      <div>
        <button id="change-skin">🎨 Change Skin</button>
      </div>
      <div>
        <button id="talk-npc-btn" style="background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);">🎋 Talk to Elder</button>
      </div>
      <div class="coin-display">
        <label>💰 Coins</label>
        <div id="player-coins" class="coin-amount">0</div>
      </div>
    </div>

    <!-- Merchant Modal -->
    <div id="merchant-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>🎨 SKIN SHOP 🎨</h2>
          <span id="close-modal" class="close">&times;</span>
        </div>
        <div class="modal-body">
          <p id="merchant-message" class="merchant-message">Welcome! Buy skins with your coins!</p>
          <div class="skin-shop-grid" id="skin-shop-list">
            <!-- Skins will be dynamically added here -->
          </div>
        </div>
      </div>
    </div>

    <!-- NPC Dialogue Modal -->
    <div id="npc-modal" class="modal">
      <div class="modal-content npc-modal-content">
        <div class="modal-header npc-modal-header">
          <h2>🎋 NÓN LÁ VIỆT NAM 🎋</h2>
          <span id="close-npc-modal" class="close">&times;</span>
        </div>
        <div class="modal-body">
          <div class="npc-avatar">
            <div class="npc-avatar-sprite"></div>
          </div>
          <div class="dialogue-box" id="dialogue-box">
            <p id="dialogue-text" class="dialogue-text"></p>
            <div class="dialogue-controls">
              <button id="next-dialogue-btn" class="dialogue-next-btn">➡ Tiếp theo</button>
              <button id="close-dialogue-btn" class="dialogue-close-btn">✖ Đóng</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="KeyPressListener.js"></script>

  </body>
</html>
